version: 2.1

orbs:
  codecov: codecov/codecov@3.0.0

jobs:
  build:
    docker:
      - image: cimg/openjdk:11.0
    steps:
      - checkout
      - run:
          name: Build
          command: mvn -B -DskipTests clean package
      - persist_to_workspace:
          root: .
          paths:
            - .
  test:
      docker: 
        - image: cimg/openjdk:11.0
      steps:
      - attach_workspace:
          at: .
      - run:
          name: Test
          command: mvn test
      - persist_to_workspace:
                  root: .
                  paths:
                      - .
      
  deploy-code-coverage-report:
      docker:
        - image: cimg/openjdk:11.0
      steps:
        - attach_workspace:
            at: .
        - codecov/upload:
            file: '/target/jacoco-reports/jacoco.xml'
            token: CODECOV_TOKEN

workflows:
  build-test-code-coverage:
    jobs:
      - build
      - test:
          requires:
          - build
      - deploy-code-coverage-report:
          requires:
          - test