version: 2.1

workflows:
  version: 2
  build-test-deploy:
    jobs:
      - build
      - test:
          requires:
          - build
      - publish-docker:
          requires:
            - test

orbs:
  codecov: codecov/codecov@3.0.0

jobs:
  build:
    docker:
      - image: cimg/openjdk:11.0
    steps:
      - checkout
      - run:
          name: Build
          command: mvn -B -DskipTests clean package
      - persist_to_workspace:
          root: .
          paths:
            - .

  test:
      docker: 
        - image: cimg/openjdk:11.0
      steps:
      - attach_workspace:
          at: .
      - run:
          name: Test
          command: mvn test
      - run:
            name: Save test results
            command: |
              mkdir -p ~/test-results/
              find . -type f -regex ".*/target/surefire-reports/.*xml" -exec cp {} ~/test-results/ \;
            when: always
      - store_test_results:
            path: '~/test-results/'
      - codecov/upload:
            file: '/target/jacoco-reports/jacoco.xml'
            token: CODECOV_TOKEN

  publish-docker:
    machine:
        image: "ubuntu-2004:current"
        docker_layer_caching: true
    working_directory: ~/repo
    steps:
      - checkout
      - run: mvn dependency:go-offline
      # - restore_cache:
      #     keys:
      #       - hello-spring-mvn-V2-{{ checksum "pom.xml" }}
      #       - hello-spring-mvn-V2
      - run: cp .mvn/wrapper/settings.xml ~/.m2/settings.xml
      - run: echo "<settingsSecurity><master>${maven_security_master}</master></settingsSecurity>" > ~/.m2/settings-security.xml
      - run:
          name: Publish Docker image with Fabric8
          command: mvn docker:build docker:push