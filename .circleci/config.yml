version: 2.1

orbs:
  codecov: codecov/codecov@3.0.0

jobs:
  build:
    docker:
      - image: cimg/openjdk:11.0
    steps:
      - checkout
      - run:
          name: Build
          command: mvn -B -DskipTests clean package
      - persist_to_workspace:
          root: .
          paths:
            - .
            
  test:
      docker: 
        - image: cimg/openjdk:11.0
      steps:
      - attach_workspace:
          at: .
      - run:
          name: Test
          command: mvn test
      - persist_to_workspace:
                  root: .
                  paths:
                      - .
  
  # store-artifacts:
  #   docker:
  #     - image: cimg/openjdk:11.0
  #   steps:
  #     - attach_workspace:
  #         at: .
  #     - store_artifacts:
  #         path: /target
  #         destination: "*.jar"

  store-test-results:
      docker:
        - image: cimg/openjdk:11.0
      steps:
        - attach_workspace:
            at: .
        - run:
            name: Save test results
            command: |
              mkdir -p ~/test-results/
              find . -type f -regex "/target/surefire-reports/.*xml" -exec cp {} /test-results/ \;
            when: always
        - store_test_results:
            path: '/test-results/'
        - persist_to_workspace:
            root: .
            paths:
              - .
      
  deploy-code-coverage-report-to-codecov:
      docker:
        - image: cimg/openjdk:11.0
      steps:
        - attach_workspace:
            at: .
        - codecov/upload:
            file: '/target/jacoco-reports/jacoco.xml'
            token: CODECOV_TOKEN
        - persist_to_workspace:
            root: .
            paths:
              - .

workflows:
  build-test-code-coverage:
    jobs:
      - build
      - test:
          requires:
          - build
      - store-artifacts:
          requires:
          - build
      - deploy-code-coverage-report-to-codecov:
          requires:
          - test
      # - store-test-results:
      #     requires:
      #     - test