version: 2.1

orbs:
  codecov: codecov/codecov@3.0.0

jobs:
  build:
    docker:
      - image: cimg/openjdk:11.0
    steps:
      - checkout
      - run:
          name: Build
          command: mvn -B -DskipTests clean package
      - persist_to_workspace:
          root: .
          paths:
            - .
            
  test:
      docker: 
        - image: cimg/openjdk:11.0
      steps:
      - attach_workspace:
          at: .
      - run:
          name: Test
          command: mvn test
      - run:
            name: Save test results
            command: |
              mkdir -p ~/test-results/
              find . -type f -regex ".*/target/surefire-reports/.*xml" -exec cp {} ~/test-results/ \;
            when: always
      # - run:
      #       name: Save artifacts
      #       command: |
      #         mkdir -p ~/artifacts/
      #         find . -type f -regex ".*/target/.*jar" -exec cp {} ~/artifacts/ \;
      #       when: always
      - store_artifacts:
          path: '/target/'
          destination: "*.jar"
      - store_test_results:
            path: '~/test-results/'
      - codecov/upload:
            file: '/target/jacoco-reports/jacoco.xml'
            token: CODECOV_TOKEN
      - persist_to_workspace:
                  root: .
                  paths:
                      - .
  
