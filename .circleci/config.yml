version: 2.1
setup: true
orbs:
  path-filtering: circleci/path-filtering@0.0.2

workflows:
  setup:
    jobs:
      - path-filtering/filter:
          base-revision: main
          mapping: |
            salesTax/.* run-salex-tax-workflow true
            testService/.* run-test-service-workflow true
          config-path: .circleci/workflows.yml