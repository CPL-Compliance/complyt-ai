version: 2.1

orbs:
  codecov: codecov/codecov@3.2.3
  aws-cli: circleci/aws-cli@1.3
  aws-ecs: circleci/aws-ecs@2.0

executors:
  ubuntu-vm:
    machine:
      image: ubuntu-2204:2022.07.1
      docker_layer_caching: true

  openjdk-image:
    docker:
      - image: cimg/openjdk:11.0

  python-image:
    docker:
      - image: 'cimg/python:3.9.1'

parameters:
  run-sales-tax-workflow:
    type: boolean
    default: false
  run-files-workflow:
    type: boolean
    default: false
  run-api-gateway-workflow:
    type: boolean
    default: false
  run-discovery-service-workflow:
    type: boolean
    default: false
  run-sales-tax-rates-workflow:
    type: boolean
    default: false

jobs:
  verify-gateway:
    parameters:
      service_directory:
        type: string
        defualt: ""
    working_directory: ~/complyt_work_directory/api-gateway
    executor: ubuntu-vm
    steps:
      - checkout:
            path: ~/complyt_work_directory
      - run:
          name: Package Discovery Service
          command: cd ../discovery-service ; ./mvnw clean package
      - run:
          name: Package Sales Tax
          command: cd ../sales-tax ; ./mvnw clean package
      - run:
          name: Package Sales Tax Rates
          command: cd ../sales-tax-rates ; ./mvnw clean package
      - run:
          name: Executeg
          command: cd ../api-gateway ; ./mvnw clean verify
      - persist_to_workspace:
          root: target
          paths:
            - coverage-reports
            - failsafe-reports
            - surefire-reports
            - site

  verify:
    parameters:
      service_directory:
        type: string
        default: ""

    working_directory: ~/complyt_work_directory/<<parameters.service_directory>>
    executor: ubuntu-vm
    steps:
      - checkout:
          path: ~/complyt_work_directory
      - run:
          name: Execute
          command: ./mvnw clean verify
      - persist_to_workspace:
          root: target
          paths:
            - coverage-reports
            - failsafe-reports
            - surefire-reports
            - site

  deploy:
    parameters:
      service_directory:
        type: string
        default: ""

    working_directory: ~/complyt_work_directory/<<parameters.service_directory>>
    executor: ubuntu-vm
    steps:
      - checkout:
          path: ~/complyt_work_directory

      - run:
          name: Release a Production Version
          command: ./mvnw --settings ../.circleci/settings.xml clean deploy

      - persist_to_workspace:
          root: target
          paths:
            - coverage-test-service
            - failsafe-test-service
            - surefire-test-service
            - site

  send-test-coverage-reports:
    parameters:
      service_directory:
        type: string
        default: ""

    working_directory: ~/complyt_work_directory/<<parameters.service_directory>>
    executor: openjdk-image
    steps:
      - checkout:
          path: ~/complyt_work_directory
      - attach_workspace:
          at: target
      - run:
          name: Save test results
          command: |
            mkdir -p test-results
            find . -type f -regex ".*/target/surefire-reports/.*xml" -exec cp {} test-results/ \;
          when: always
      - store_test_results:
          path: test-results/
      - codecov/upload:
          file: target/site/jacoco-ut/jacoco.xml
          token: CODECOV_TOKEN
          flags: <<parameters.service_directory>>

  update-ecs-service:
    parameters:
      service_name:
        type: string
        default: ""

    executor: python-image
    steps:
      - run:
          name: test
          command: echo 'container=<<parameters.service_name>>-container, tag=latest'
      - aws-cli/setup:
          aws-access-key-id: AWS_ACCESS_KEY_ID
          aws-region: AWS_DEFAULT_REGION
          aws-secret-access-key: AWS_SECRET_ACCESS_KEY
      - aws-ecs/update-service:
          cluster-name: 'production'
          container-image-name-updates: 'container=<<parameters.service_name>>-container, tag=latest'
          family: '<<parameters.service_name>>-task-definition'
          service-name: '<<parameters.service_name>>-service'

workflows:
  sales-tax-workflow:
    when: << pipeline.parameters.run-sales-tax-workflow >>
    jobs:
      - verify:
          filters:
            branches:
              only:
                - /^(main.+|(?!main).*)$/
          service_directory: "sales-tax"

      - deploy:
          filters:
            branches:
              only:
                - main
          service_directory: "sales-tax"

      - send-test-coverage-reports:
          requires:
            - verify
            - deploy
          service_directory: "sales-tax"

      - update-ecs-service:
          requires:
            - deploy
          service_name: "sales-tax"

  files-workflow:
    when: << pipeline.parameters.run-files-workflow >>
    jobs:
      - verify:
          filters:
            branches:
              only:
                - /^(main.+|(?!main).*)$/
          service_directory: "files"

      - deploy:
          filters:
            branches:
              only:
                - main
          service_directory: "files"

      - send-test-coverage-reports:
          requires:
            - verify
            - deploy
          service_directory: "files"

      - update-ecs-service:
          requires:
            - deploy
          service_name: "files"

  api-gateway-workflow:
    when: << pipeline.parameters.run-api-gateway-workflow >>
    jobs:
      - verify-gateway:
          filters:
            branches:
              only:
                - /^(main.+|(?!main).*)$/
          service_directory: "api-gateway"

      - deploy:
          filters:
            branches:
              only:
                - main
          service_directory: "api-gateway"

      - send-test-coverage-reports:
          requires:
            - verify-gateway
            - deploy
          service_directory: "api-gateway"

      - update-ecs-service:
          requires:
            - deploy
          service_name: "api-gateway"

  discovery-service-workflow:
    when: << pipeline.parameters.run-discovery-service-workflow >>
    jobs:
      - verify:
          filters:
            branches:
              only:
                - /^(main.+|(?!main).*)$/
          service_directory: "discovery-service"

      - deploy:
          filters:
            branches:
              only:
                - main
          service_directory: "discovery-service"

      - send-test-coverage-reports:
          requires:
            - verify
            - deploy
          service_directory: "discovery-service"

      - update-ecs-service:
          requires:
            - deploy
          service_name: "discovery-service"

  sales-tax-rates-workflow:
    when: << pipeline.parameters.run-sales-tax-rates-workflow >>
    jobs:
      - verify:
          filters:
            branches:
              only:
                - /^(main.+|(?!main).*)$/
          service_directory: "sales-tax-rates"

      - deploy:
          filters:
            branches:
              only:
                - main
          service_directory: "sales-tax-rates"

      - send-test-coverage-reports:
          requires:
            - verify
            - deploy
          service_directory: "sales-tax-rates"

      - update-ecs-service:
          requires:
            - deploy
          service_name: "sales-tax-rates"