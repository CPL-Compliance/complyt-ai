version: 2.1

orbs:
  codecov: codecov/codecov@3.2.3
  aws-cli: circleci/aws-cli@1.3
  aws-ecs: circleci/aws-ecs@2.0
  github-maven-deploy: github-maven-deploy/github-maven-deploy@1.2.0

executors:
  ubuntu-vm:
    machine:
      image: ubuntu-2204:2022.07.1
      docker_layer_caching: true

  openjdk-image:
    docker:
      - image: cimg/openjdk:11.0

  python-image:
    docker:
      - image: cimg/python:3.10.12-browsers

  maven-executor:
    docker:
      - image: circleci/openjdk:8u232-jdk


parameters:
  run-sales-tax-workflow:
    type: boolean
    default: false
  run-files-workflow:
    type: boolean
    default: false
  run-api-gateway-workflow:
    type: boolean
    default: false
  run-discovery-service-workflow:
    type: boolean
    default: false
  run-sales-tax-rates-workflow:
    type: boolean
    default: false

jobs:

  package-dependency:
    parameters:
      service_directory:
        type: string
        default: ""

    working_directory: ~/complyt_work_directory/<<parameters.service_directory>>
    executor: ubuntu-vm
    steps:
      - checkout:
          path: ~/complyt_work_directory
      - run:
          name: Execute
          command: ./mvnw clean package -Dmaven.test.skip
      - persist_to_workspace:
          root: ~/complyt_work_directory
          paths:
            - <<parameters.service_directory>>/target/*.jar
      - run:
          name: ECHO
          command: echo $IMAGE_TAG

  verify:
    parameters:
      service_directory:
        type: string
        default: ""

    working_directory: ~/complyt_work_directory/<<parameters.service_directory>>
    executor: ubuntu-vm
    steps:
      - checkout:
          path: ~/complyt_work_directory
      - attach_workspace:
          at: ~/complyt_work_directory

      - run:
          name: Execute
          command: ./mvnw clean verify
      - persist_to_workspace:
          root: target
          paths:
            - coverage-reports
            - failsafe-reports
            - surefire-reports
            - site

  deploy:
    parameters:
      service_directory:
        type: string
        default: ""

    working_directory: ~/complyt_work_directory/<<parameters.service_directory>>
    executor: ubuntu-vm
    steps:
      - checkout:
          path: ~/complyt_work_directory
      - attach_workspace:
          at: ~/complyt_work_directory

      - run:
          name: Release a Production Version
          command: ./mvnw --settings ../.circleci/settings.xml clean deploy

      - persist_to_workspace:
          root: target
          paths:
            - coverage-test-service
            - failsafe-test-service
            - surefire-test-service
            - site

  send-test-coverage-reports:
    parameters:
      service_directory:
        type: string
        default: ""

    working_directory: ~/complyt_work_directory/<<parameters.service_directory>>
    executor: openjdk-image
    steps:
      - checkout:
          path: ~/complyt_work_directory
      - attach_workspace:
          at: target
      - run:
          name: Save test results
          command: |
            mkdir -p test-results
            find . -type f -regex ".*/target/surefire-reports/.*xml" -exec cp {} test-results/ \;
          when: always
      - store_test_results:
          path: test-results/
      - codecov/upload:
          file: target/site/jacoco-ut/jacoco.xml
          token: CODECOV_TOKEN
          flags: <<parameters.service_directory>>


  update-ecs-service:
    parameters:
      service_name:
        type: string
        default: ""
    working_directory: ~/complyt_work_directory/<<parameters.service_name>>

    executor: python-image
    steps:
      - checkout:
          path: ~/complyt_work_directory
      - run:
          name: Set up image tag
          command: |
            image_tag=$(grep -m2 '<version>' pom.xml | tail -n1 | sed -n 's/.*<version>\([0-9.]*\).*<\/version>.*/\1/p')
            echo "export IMAGE_TAG=$(echo "$image_tag")" >> "$BASH_ENV"
            source $BASH_ENV
      - run:
          name: test
          command: echo "container=<<parameters.service_name>>-container, tag=${IMAGE_TAG}"
      - aws-cli/setup:
          aws-access-key-id: AWS_ACCESS_KEY_ID
          aws-region: AWS_DEFAULT_REGION
          aws-secret-access-key: AWS_SECRET_ACCESS_KEY
      - aws-ecs/update-service:
          cluster-name: "production"
          container-image-name-updates: "container=<<parameters.service_name>>-container, tag=latest"
          family: "<<parameters.service_name>>-task-definition"
          service-name: "<<parameters.service_name>>-service"

  release:
    steps:
      - checkout:
          path: ~/complyt_work_directory
      - run:
        name: Cut new release
        command: |
          # assemble current and new version numbers
          OLD_VERSION=$(mvn -s .circleci/settings.xml -q \
            -Dexec.executable="echo" -Dexec.args='${project.version}' \
            --non-recursive org.codehaus.mojo:exec-maven-plugin:1.3.1:exec)
          NEW_VERSION="${OLD_VERSION/-SNAPSHOT/}"
          echo "Releasing $OLD_VERSION as $NEW_VERSION"

          # ensure dependencies use release versions
          mvn -s .circleci/settings.xml versions:use-releases

          # write release version to POM
          mvn -s .circleci/settings.xml versions:set -DnewVersion="$NEW_VERSION"

          # setup git
          git config user.name "eyalTams"
          git config user.email "eyaltams@Gmail.com"

          # commit and tag
          git add pom.xml
          git commit -m "release: $NEW_VERSION"
          git tag "$NEW_VERSION"

          # land on master and publish
#            git checkout master
#            git merge --no-edit release
#            git push origin master --tags

          # increment minor version number
          MAJ_VERSION=$(echo "$NEW_VERSION" | cut -d '.' -f 1)
          MIN_VERSION=$(echo "$NEW_VERSION" | cut -d '.' -f 2)
          NEW_MINOR=$(($MIN_VERSION + 1))
          DEV_VERSION="$MAJ_VERSION.$NEW_MINOR-SNAPSHOT"
          echo "DEV VERSION " $DEV_VERSION
          # ready development branch
          git checkout verify
          git merge --no-edit release
          mvn -s ../.circleci/settings.xml versions:set -DnewVersion="$DEV_VERSION"
          git add pom.xml
          git commit -m "ready for development: $DEV_VERSION"
          git push origin verify

          # clean up release branch
          git push origin :release

  deployy:
    steps:
      - attach_workspace:
          at: ~/complyt_work_directory
      - run:
          name: Deploy to Artifactory
          command: mvn deploy

  build:
    parameters:
      service_name:
        type: string
        default: ""
    working_directory: ~/complyt_work_directory/<<parameters.service_name>>
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-dependencies-{{ checksum "pom.xml" }}
            # fallback to using the latest cache if no exact match is found
            - v1-dependencies-
      - run: mvn clean install
      - save_cache:
          paths:
            - ~/.m2
          key: v1-dependencies-{{ checksum "pom.xml" }}
      - persist_to_workspace:
          root: ~/complyt_work_directory
          paths:
            - <<parameters.service_directory>>/target/*.jar
workflows:
  build-and-deploy:
    jobs:
      - build:
          service_name: "files"
      - deployy:
          requires:
            - build
          filters:
            branches:
              only:
                - eyal/com-235-api-micro-services-versioning-management
      - release:
          requires:
            - build
          filters:
            branches:
              only:
                - eyal/com-235-api-micro-services-versioning-management

  sales-tax-workflow:
    when: << pipeline.parameters.run-sales-tax-workflow >>
    jobs:
      - verify:
          filters:
            branches:
              only:
                - /^(main.+|(?!main).*)$/
          service_directory: "sales-tax"

      - deploy:
          filters:
            branches:
              only:
                - main
          service_directory: "sales-tax"

      - send-test-coverage-reports:
          requires:
            - verify
            - deploy
          service_directory: "sales-tax"

      - update-ecs-service:
          requires:
            - deploy
          service_name: "sales-tax"

  files-workflow:
    when: << pipeline.parameters.run-files-workflow >>
    jobs:
      - verify:
          filters:
            branches:
              only:
                - /^(main.+|(?!main).*)$/
          service_directory: "files"

      - deploy:
          filters:
            branches:
              only:
                - eyal/com-235-api-micro-services-versioning-management
          service_directory: "files"

      - send-test-coverage-reports:
          requires:
            - verify
            - deploy
          service_directory: "files"

      - update-ecs-service:
          requires:
            - verify


  api-gateway-workflow:
    when: << pipeline.parameters.run-api-gateway-workflow >>
    jobs:
      - package-dependency:
          name: package-sales-tax
          service_directory: "sales-tax"
      - package-dependency:
          name: package-sales-tax-rates
          service_directory: "sales-tax-rates"
      - package-dependency:
          name: package-discovery-service
          service_directory: "discovery-service"
      - package-dependency:
          name: package-files
          service_directory: "files"
      - verify:
          filters:
            branches:
              only:
                - /^(main.+|(?!main).*)$/
          requires:
            - package-sales-tax
            - package-sales-tax-rates
            - package-discovery-service
            - package-files
          service_directory: "api-gateway"

      - deploy:
          filters:
            branches:
              only:
                - main
          requires:
            - package-sales-tax
            - package-sales-tax-rates
            - package-discovery-service
            - package-files
          service_directory: "api-gateway"

      - send-test-coverage-reports:
          requires:
            - verify
            - deploy
          service_directory: "api-gateway"

      - update-ecs-service:
          requires:
            - deploy
          service_name: "api-gateway"

  discovery-service-workflow:
    when: << pipeline.parameters.run-discovery-service-workflow >>
    jobs:
      - verify:
          filters:
            branches:
              only:
                - /^(main.+|(?!main).*)$/
          service_directory: "discovery-service"

      - deploy:
          filters:
            branches:
              only:
                - main
          service_directory: "discovery-service"

      - send-test-coverage-reports:
          requires:
            - verify
            - deploy
          service_directory: "discovery-service"

      # We update all the services that run Discovery Services
      - update-ecs-service:
          requires:
            - deploy
          service_name: "discovery-service-az-1a"

      - update-ecs-service:
          requires:
            - deploy
          service_name: "discovery-service-az-1b"

  sales-tax-rates-workflow:
    when: << pipeline.parameters.run-sales-tax-rates-workflow >>
    jobs:
      - verify:
          filters:
            branches:
              only:
                - /^(main.+|(?!main).*)$/
          service_directory: "sales-tax-rates"

      - deploy:
          filters:
            branches:
              only:
                - main
          service_directory: "sales-tax-rates"

      - send-test-coverage-reports:
          requires:
            - verify
            - deploy
          service_directory: "sales-tax-rates"

      - update-ecs-service:
          requires:
            - deploy
          service_name: "sales-tax-rates"
