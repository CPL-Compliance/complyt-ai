name: Find Linear Issue in Pull Request

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    types: [opened, reopened]
  pull_request_target:
    branches:
      - main
    types: [synchronize]

jobs:
  fetch-linear-ticket-info:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Linear Ticket
        id: fetch-ticket
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: |
          HEAD_REF="${{ github.head_ref }}"
          # Extract the issue number from branch name (e.g., "com-33" -> "33")
          ISSUE_NUMBER=$(echo "$HEAD_REF" | grep -oP 'com-\d+' | grep -oP '\d+')
          
          # Map to the correct Linear issue ID format (THOMAS-XX for this repository)
          if [ -n "$ISSUE_NUMBER" ]; then
            ISSUE_ID="THOMAS-$ISSUE_NUMBER"
          else
            echo "No issue number found in branch name"
            exit 1
          fi
          
          echo "Extracted issue ID: $ISSUE_ID"
          RESPONSE=$(curl -s -X POST \
            https://api.linear.app/graphql \
            -H "Authorization: $LINEAR_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"query":"query { issue(id: \"'$ISSUE_ID'\") { id title description state { name } } }"}')
          echo "::set-output name=response::$RESPONSE"

      - name: Check if ticket exists
        id: check-response
        run: |
          RESPONSE="${{ fromJson(steps.fetch-ticket.outputs.response).data.issue.id }}"
          echo $RESPONSE
          if [ -z "$RESPONSE" ]; then
            echo "Error: Ticket ID is null or empty"
            exit 1
          fi
