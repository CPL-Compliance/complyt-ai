name: Find Linear Issue in Pull Request

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    types: [opened, reopened]
  pull_request_target:
    branches:
      - main
    types: [synchronize]

jobs:
  find-linear-issue-on-pull-request:
    runs-on: ubuntu-latest
    steps:
      - name: Find the Linear Issue
        id: findIssue
        uses: nrpx/action-find-linear-issue@v1.3
        with:
          linear-api-key: ${{secrets.LINEAR_API_KEY}}
      - name: Show ticket
        run: |
          echo ${{ fromJson(steps.findIssue.outputs.linear-issue).identifier }}
