auth0.audience: ${audience}

spring:
  security.oauth2.resourceserver.jwt.issuer-uri: ${issuer-uri}
  config.import: vault://
  cloud:
    # Spring Cloud Vault configuration
    # To understand what every field stands for visit
    # https://cloud.spring.io/spring-cloud-vault/reference/html/
    vault:
      enabled: true
      application-name: api-gateway-service
      host: ${VAULT_HOST}
      port: 8200
      scheme: https
      namespace: admin
      fail-fast: true
      config:
        lifecycle:
          enabled: true
          min-renewal: 10s
          expiry-threshold: 1m
      authentication: APPROLE
      app-role:
        role-id: ${VAULT_ROLE_ID}
        secret-id: ${VAULT_SECRET_ID}
        role: ${VAULT_ROLE}
        app-role-path: approle
      kv:
        enabled: true
        default-context:

eureka:
  client:
    serviceUrl:
      defaultZone: ${discovery-service-uri}
  instance:
    prefer-ip-address: true

springdoc:
  swagger-ui:
    use-root-path: true
    urls:
      - name: files
        url: /v3/api-docs/files
      - name: sales-tax
        url: /v3/api-docs/sales-tax
  api-docs:
    version: openapi_3_0