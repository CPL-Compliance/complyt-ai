server.port: 8761
spring:
  application.name: discovery-service-clustered
  cloud:
    vault:
      enabled: true
      application-name: discovery-service
      host: ${VAULT_HOST}
      port: 8200
      scheme: https
      namespace: admin
      fail-fast: true
      config:
        lifecycle:
          enabled: true
          min-renewal: 10s
          expiry-threshold: 1m
      authentication: APPROLE
      app-role:
        role-id: ${VAULT_ROLE_ID}
        secret-id: ${VAULT_SECRET_ID}
        role: ${VAULT_ROLE}
        app-role-path: approle
      kv:
        enabled: true
        default-context:

spring.config.import: vault://

eureka:
  client:
    # We set these two parameters to prevent from the Discovery Service to look for a discovery service
    # (because this is who he is) and fetch its registry
    register-with-eureka: true
    fetch-registry: true
    serviceUrl:
      defaultZone: ${service-url-default-zone}
  server:
    expected-client-renewal-interval-seconds: 30
    eviction-interval-timer-in-ms: 60000
    renewal-percent-threshold: 0.85
    renewal-threshold-update-interval-ms: 900000
    enable-self-preservation: true
  instance:
    lease-expiration-duration-in-seconds: 90
#    prefer-ip-address: true
    hostname: internal-test-discovery-srv-az-1a-lb-269943589.us-east-1.elb.amazonaws.com


# Observability
management.metrics.distribution.percentiles-histogram.http.server.requests: true
management.tracing.sampling.probability: 1.0