eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
    enabled: false
  instance:
    prefer-ip-address: true

spring:
  data:
    mongodb:
      uri: mongodb+srv://${spring.datasource.username}:${spring.datasource.password}@cluster0.tlaie.mongodb.net/files


logging:
  level:
    root: INFO
    web: INFO
    org:
      springframework:
        security: INFO
    reactor:
      netty:
        http: INFO