eureka:
  client:
    serviceUrl:
      defaultZone: http://complyt-peer-2:8762/eureka/, http://complyt-peer-1:8761/eureka/
    should-unregister-on-shutdown: true
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 30

spring:
  data:
    mongodb:
      uri: ${mongo-uri}
      database: ${db-name}

logging:
  level:
    root: INFO
    web: INFO
    org:
      springframework:
        security: INFO
    reactor:
      netty:
        http: INFO