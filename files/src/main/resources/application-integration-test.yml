auth0.audience: null

eureka:
  client:
    should-unregister-on-shutdown: true
    register-with-eureka: true
    registry-fetch-interval-seconds: 15
    initial-instance-info-replication-interval-seconds: 1
  instance:
    prefer-ip-address: false
    lease-renewal-interval-in-seconds: 30

logging:
  level:
    root: info

spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: "https://issuer-uri.com/"
  cloud:
    vault:
      enabled: false
  data:
    mongodb:
      database: files
key:
url-ttl: 15
bucket-name: "test"
project-id: "test"
google:
  storage:
    url: "http://test-host:4443"
