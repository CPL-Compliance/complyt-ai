eureka:
  client:
    serviceUrl:
      defaultZone: ${discovery-service-uri}
    should-unregister-on-shutdown: true
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 30

spring:
  data:
    mongodb:
      uri: ${mongo-uri}
      database: ${db-name}

  logging:
  level:
    root: INFO
    web: INFO
    org:
      springframework:
        security: INFO
    reactor:
      netty:
        http: INFO