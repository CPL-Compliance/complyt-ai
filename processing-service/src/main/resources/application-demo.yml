eureka:
  client:
    enabled: false
    serviceUrl:
      defaultZone: ${discovery-service-uri}
    should-unregister-on-shutdown: true
    initial-instance-info-replication-interval-seconds: 1
    registry-fetch-interval-seconds: 3
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 30

# Spring Cloud Vault configuration
# To understand what every field stands for visit
# https://cloud.spring.io/spring-cloud-vault/reference/html/
spring.cloud.vault:
  enabled: true
  application-name: processing-service${ecs_cluster_name:}
  host: ${VAULT_HOST}
  port: 8200
  scheme: https
  namespace: admin
  fail-fast: true
  config:
    lifecycle:
      enabled: true
      min-renewal: 10s
      expiry-threshold: 1m
  authentication: APPROLE
  app-role:
    role-id: ${VAULT_ROLE_ID}
    secret-id: ${VAULT_SECRET_ID}
    role: ${VAULT_ROLE}
    app-role-path: approle
  kv:
    enabled: true
    default-context:

spring.config.import: vault://

