server:
  port: ${PORT:9898}

# Change to secret
eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka

spring:
  data:
    mongodb:
      uri: mongodb+srv://${spring.datasource.username}:${spring.datasource.password}@cluster0.tlaie.mongodb.net/sales_tax

logging:
  level:
    root: INFO
    web: INFO
    org:
      springframework:
        security: INFO
    reactor:
      netty:
        http: INFO

management:
  endpoints:
    web:
      exposure:
        include: "*"