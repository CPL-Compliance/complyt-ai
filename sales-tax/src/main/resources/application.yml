spring.application.name: sales-tax-service
spring:
  profiles:
    active:
      # local - to run your application directly on the OS
      # local-docker - to run your application in a docker container
      # connected to a MongoDB that runs in a docker container as well.
      # To run in this profile execute ./mvnw clean package docker:build docker:run
      # production - This is for production only
      - production
      # fastTax - to use FastTax service
      # stubFastTax - to use stub method of FastTax
      # zipTax - to use Zip Tax Service
      - fastTax

spring.cloud.vault:
  enabled: true
  application-name: sales-tax-service
  host: ${VAULT_HOST}
  port: 8200
  scheme: https
  namespace: admin
  fail-fast: true
  config:
    lifecycle:
      enabled: true
      min-renewal: 10s
      expiry-threshold: 1m
  authentication: APPROLE
  app-role:
    role-id: ${VAULT_ROLE_ID}
    secret-id: ${VAULT_SECRET_ID}
    role: ${VAULT_ROLE}
    app-role-path: approle
  generic:
    enabled: true
    backend: secret
  kv:
    enabled: true
    default-context:
  database:
    enabled: true
    role: ${VAULT_DB_ROLE}
    backend: database

spring.config.import: vault://

logging:
  level:
    root: INFO
    web: DEBUG
    org:
      springframework:
        security: DEBUG
    reactor:
      netty:
        http: TRACE

management:
  endpoints:
    web:
      exposure:
        include: "*"



