eureka:
  client:
    serviceUrl:
      defaultZone: ${discovery-service-uri}
  instance:
    prefer-ip-address: true

auth0:
  audience: ${audience}

# This property sets the issuer URI
# for the application to interact with the Resource Server for authentication and authorization purposes
spring.security:
  oauth2:
    resourceserver:
      jwt:
        issuer-uri: ${issuer-uri}